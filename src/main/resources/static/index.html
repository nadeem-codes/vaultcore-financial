<!DOCTYPE html>
<html>
<head>
    <title>VaultCore Financial</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            margin: 0;
            padding: 0;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        .container {
            width: 80%;
            margin: auto;
        }

        .card {
            background: white;
            color: black;
            padding: 20px;
            margin: 20px 0;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        input {
            padding: 10px;
            width: 60%;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #28a745;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover {
            background: #218838;
        }

        .result {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>💳 VaultCore Financial</h1>

<div class="container">

    <div class="card">
        <h3>Create User</h3>
        <input id="username" placeholder="Enter Username">
        <button onclick="createUser()">Create</button>
        <div id="userResult" class="result"></div>
    </div>

    <div class="card">
        <h3>Create Account</h3>
        <input id="userId" placeholder="Enter User ID">
        <button onclick="createAccount()">Create Account</button>
        <div id="accountResult" class="result"></div>
    </div>

    <div class="card">
        <h3>Get Balance</h3>
        <input id="accountId" placeholder="Enter Account ID">
        <button onclick="getBalance()">Check Balance</button>
        <div id="balanceResult" class="result"></div>
    </div>

</div>

<script>
async function createUser() {
    const username = document.getElementById("username").value;

    const response = await fetch("http://localhost:8081/users", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username })
    });

    const data = await response.text();
    document.getElementById("userResult").innerText = data;
}
</script>

</body>
</html>
